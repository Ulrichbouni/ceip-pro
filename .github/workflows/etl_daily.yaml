name: CEIP Professional ETL & AI

on:
  schedule:
    - cron: '0 4 * * *'   # 4h UTC tous les jours
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests pandas sqlalchemy psycopg2-binary xgboost scikit-learn joblib
      - name: Run ETL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python data-engine/etl_runner.py